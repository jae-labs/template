---
name: Release

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Draft Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Run release checks
        run: lefthook run pre-push --all-files

      - name: Build release artifacts
        shell: bash
        run: |
          mkdir -p dist
          printf '%s\n' \
            'Replace this placeholder with Project Horizon release artifacts.' \
            > dist/README.txt

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --draft \
              --generate-notes \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG"
          fi
