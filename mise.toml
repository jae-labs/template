# Pinned tool versions for Project Horizon local development.
# CI should use this file as the source of truth where possible.

[tools]
go = "1.26.4"
golangci-lint = "2.12.2"
node = "22.12.0"
python = "3.14"
terraform = "1.15.5"
tflint = "0.63.1"
lefthook = "2.1.9"
"aqua:gitleaks/gitleaks" = "8.28.0"
"aqua:koalaman/shellcheck" = "0.10.0"
"aqua:mvdan/sh" = "3.11.0"
"aqua:rhysd/actionlint" = "1.7.8"
"aqua:sethvargo/ratchet" = "0.11.4"
taplo = "0.10.0"
"npm:markdownlint-cli2" = "0.18.1"
"npm:prettier" = "3.6.2"
"pipx:ansible-lint" = "26.4.0"
"pipx:yamllint" = "1.37.1"

[tasks.install-hooks]
description = "Install Lefthook Git hooks."
run = "lefthook install"

[tasks.lint]
description = "Run template lint checks."
run = """
yamllint .
markdownlint-cli2 "**/*.md" "#node_modules"
taplo fmt --check .air.toml mise.toml
actionlint .github/workflows/*.yml
golangci-lint config verify
lefthook validate

if git rev-parse --verify HEAD >/dev/null 2>&1; then
  lefthook run pre-commit --all-files
else
  printf '%s\n' 'Skipping lefthook --all-files because this repository has no HEAD yet.'
fi
"""

[tasks.check]
description = "Run template pre-push checks."
run = """
if git rev-parse --verify HEAD >/dev/null 2>&1; then
  lefthook run pre-push --all-files
else
  printf '%s\n' 'Skipping lefthook pre-push because this repository has no HEAD yet.'
fi
"""
