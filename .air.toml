root = "."
tmp_dir = "tmp"

[build]
# Update this path if Project Horizon uses a different Go entrypoint.
cmd = "go build -o ./tmp/project-horizon ./cmd/project-horizon"
bin = "./tmp/project-horizon"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "node_modules", ".git"]
exclude_regex = ["_test\\.go"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = false

[misc]
clean_on_exit = true
