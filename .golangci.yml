---
version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - testifylint
    - unconvert
    - unused
    - whitespace

  settings:
    misspell:
      locale: US
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

  exclusions:
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: (.+)_test\.go
        linters:
          - gosec
        text: "G101: Potential hardcoded credentials"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
